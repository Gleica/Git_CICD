# =====================================================================
# Claude PR Review — workflow GitHub Actions
#
# Triggered em todo pull_request. Lê o diff, manda pro Claude Haiku
# revisar, e posta o comentário no PR.
#
# Pré-requisitos:
#   - Repositório no GitHub com este arquivo em .github/workflows/
#   - Secret 'ANTHROPIC_API_KEY' configurado (Settings > Secrets > Actions)
#   - GITHUB_TOKEN é injetado automaticamente pelo Actions
# =====================================================================

name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write   # necessário para postar comentários no PR

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # precisamos do histórico para gerar o diff

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependências
        run: pip install anthropic

      - name: Rodar review com Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:         ${{ github.event.pull_request.number }}
          PR_TITLE:          ${{ github.event.pull_request.title }}
          PR_AUTHOR:         ${{ github.event.pull_request.user.login }}
          BASE_SHA:          ${{ github.event.pull_request.base.sha }}
          HEAD_SHA:          ${{ github.event.pull_request.head.sha }}
          REPO:              ${{ github.repository }}
        run: python .github/scripts/review_pr.py
